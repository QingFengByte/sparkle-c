name: Build

permissions: write-all

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag version to release'
        required: false

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            format: nsis

          - os: windows-latest
            arch: arm64
            format: nsis

          - os: macos-latest
            arch: x64

          - os: macos-latest
            arch: arm64

    name: Build ${{ matrix.os }}-${{ matrix.arch }}${{ matrix.format && '-' || '' }}${{ matrix.format || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        run: npm install -g pnpm

      - name: Determine and Update Version
        shell: bash
        run: |
          GIT_COMMIT_HASH=$(git rev-parse --short HEAD)
          VERSION=$(jq -r '.version' package.json)

          if [ "${{ github.event.inputs.version }}" == "" ]; then
            BASE_VERSION=$(echo $VERSION | awk -F. '{print $1"."$2"."$3+1}')
            VERSION_PREFIX=beta
            RELEASE_VERSION="${BASE_VERSION}-${VERSION_PREFIX}-${GIT_COMMIT_HASH}"
          else
            INPUT_VERSION="${{ github.event.inputs.version }}"
            CLEAN_VERSION=$(echo "$INPUT_VERSION" | sed 's/^v//')

            if [[ ! "$CLEAN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version format: $INPUT_VERSION"
              exit 1
            fi

            RELEASE_VERSION="$CLEAN_VERSION"
          fi

          echo "Release Version: $RELEASE_VERSION"

          jq --arg version "$RELEASE_VERSION" '.version = $version' package.json > tmp.json
          mv tmp.json package.json

      - name: Install Dependencies and Prepare
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        shell: bash
        run: |
          SKIP_PREPARE=1 pnpm install
          pnpm prepare --${{ matrix.arch }}

      - name: Build
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pnpm build:win nsis --${{ matrix.arch }}
          else
            pnpm build:mac --${{ matrix.arch }}
          fi

      # 可选：清理 macOS .app（不影响 pkg 生成，只是避免残留）
      - name: Cleanup macOS .app
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          find dist -name "*.app" -type d -exec rm -rf {} + || true

      - name: List dist files
        shell: bash
        run: |
          echo "==== DIST FILES ===="
          find dist -type f

      - name: Create Changelog
        shell: bash
        run: |
          git log -1 --pretty=format:"%s%n%b" > changelog.md

      - name: Generate latest.yml
        shell: bash
        run: |
          SKIP_CHANGELOG=1 pnpm updater

      # ✅ 关键修改：只上传最终产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}${{ matrix.format && '-' || '' }}${{ matrix.format || '' }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.pkg
            latest.yml
            changelog.md
